<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>মেরিট কেয়ার - ভাউচার</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Hind Siliguri',Arial,sans-serif;
  background:#f0f4f0;
  padding:10px;
}

/* ========= FORM SECTION ========= */
.form-wrap{
  background:#fff;
  border:2px solid #2e7d32;
  border-radius:8px;
  padding:16px;
  margin-bottom:16px;
  max-width:600px;
  margin-left:auto;
  margin-right:auto;
}

.form-wrap h3{
  color:#1b5e20;
  font-size:16px;
  font-weight:700;
  margin-bottom:14px;
  border-bottom:2px solid #a5d6a7;
  padding-bottom:8px;
}

.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.fg label{font-size:12px;color:#555;font-weight:600;}
.fg input{
  border:1.5px solid #c8e6c9;
  border-radius:4px;
  padding:8px 10px;
  font-family:inherit;
  font-size:14px;
  width:100%;
}
.fg input:focus{outline:none;border-color:#2e7d32;}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* items table in form */
.tbl{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:8px;}
.tbl th{background:#2e7d32;color:#fff;padding:7px 4px;text-align:center;border:1px solid #1b5e20;}
.tbl td{border:1px solid #c8e6c9;padding:4px 3px;}
.tbl input{width:100%;border:none;background:transparent;font-family:inherit;font-size:13px;text-align:center;padding:2px;}
.tbl input[type=text]{text-align:left;}
.tbl input:focus{outline:none;background:#f1f8e9;}

.del-btn{
  background:#ffebee;border:none;color:#c62828;
  border-radius:4px;padding:3px 7px;cursor:pointer;font-size:12px;font-weight:700;width:100%;
}

.total-show{
  text-align:right;font-size:14px;font-weight:700;
  color:#1b5e20;padding:5px 0 8px;
}

.btn-row{display:flex;gap:8px;flex-wrap:wrap;}
.btn{
  padding:9px 16px;border:none;border-radius:5px;
  font-family:inherit;font-size:14px;font-weight:600;
  cursor:pointer;flex:1;min-width:120px;
}
.btn-g{background:#2e7d32;color:#fff;}
.btn-o{background:#fff;color:#2e7d32;border:2px solid #2e7d32;}
.btn-p{background:#f9a825;color:#fff;}
.btn-r{background:#c62828;color:#fff;}

/* ========= VOUCHER (print unit) ========= */
.voucher{
  background:#fff;
  border:2px solid #2e7d32;
  border-radius:6px;
  overflow:hidden;
  font-size:13px;
  position:relative;
}

.v-topband{background:linear-gradient(90deg,#1b5e20,#43a047,#1b5e20);height:6px;}

.v-header{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 14px 8px;
  border-bottom:1.5px dashed #a5d6a7;
  background:#f9fff9;
}

.v-logo{
  width:70px;height:70px;
  object-fit:contain;
  flex-shrink:0;
  border-radius:50%;
  border:2px solid #43a047;
}

.v-school{flex:1;text-align:center;}
.v-school .nm{font-size:15px;font-weight:700;color:#1b5e20;line-height:1.3;}
.v-school .addr{font-size:11px;color:#388e3c;margin-top:2px;}
.v-school .mob{font-size:11px;color:#555;margin-top:1px;}

.v-badge{
  background:#2e7d32;color:#fff;
  font-size:14px;font-weight:700;
  letter-spacing:3px;text-align:center;
  padding:5px 0;
}

.v-info{
  display:grid;
  grid-template-columns:1fr 1fr 120px 100px;
  gap:6px;
  padding:10px 14px 4px;
}

.v-field .lbl{font-size:10px;color:#777;font-weight:600;text-transform:uppercase;}
.v-field .val{
  border-bottom:1px solid #aaa;
  padding:3px 0 1px;
  font-size:13px;color:#222;
  min-height:22px;word-break:break-word;
}

.v-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.v-tbl th{background:#2e7d32;color:#fff;padding:6px 8px;text-align:center;border:1px solid #1b5e20;}
.v-tbl td{border:1px solid #c8e6c9;padding:5px 8px;text-align:center;}
.v-tbl tr:nth-child(even) td{background:#f1f8e9;}
.v-tbl td.dl{text-align:left;}
.v-tbl tfoot td{background:#e8f5e9;font-weight:700;color:#1b5e20;border-top:2px solid #2e7d32;}

.v-footer{
  display:flex;justify-content:space-between;align-items:flex-end;
  padding:10px 14px 12px;
  border-top:1.5px dashed #a5d6a7;
  margin-top:6px;
}
.sig-block{text-align:center;}
.sig-line{border-bottom:1px solid #555;width:110px;margin:0 auto 3px;min-height:32px;}
.sig-lbl{font-size:11px;color:#555;font-weight:600;}

.v-botband{background:linear-gradient(90deg,#1b5e20,#43a047,#1b5e20);height:5px;}

/* ========= PREVIEW wrapper ========= */
.preview-box{
  max-width:600px;margin:0 auto 16px;
}
.preview-title{
  text-align:center;font-size:13px;color:#777;
  margin-bottom:8px;font-weight:600;
}

/* ========= PRINT ========= */
@media print{
  body{background:#fff;padding:0;margin:0;}
  .form-wrap,.preview-title,.no-print{display:none!important;}
  .preview-box{max-width:100%;margin:0;}
  
  /* A4: two copies stacked */
  .print-page{
    width:210mm;
    margin:0 auto;
    padding:8mm 10mm;
    display:flex;
    flex-direction:column;
    gap:6mm;
  }
  
  .copy-label{
    text-align:center;
    font-size:10px;
    color:#555;
    font-weight:700;
    letter-spacing:2px;
    margin-bottom:2mm;
    text-transform:uppercase;
  }

  .voucher{
    border:1.5px solid #2e7d32;
    border-radius:4px;
    page-break-inside:avoid;
  }

  .cut-line{
    border-top:1.5px dashed #999;
    margin:3mm 0;
    text-align:center;
    font-size:9px;
    color:#aaa;
    letter-spacing:3px;
  }
}

@media screen{
  .print-page{display:contents;}
  .cut-line{display:none;}
  .copy-label{display:none;}
}

/* Responsive */
@media(max-width:500px){
  .v-info{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- ====== INPUT FORM ====== -->
<div class="form-wrap no-print">
  <h3>📝 ভাউচার তথ্য পূরণ করুন</h3>

  <div class="row2">
    <div class="fg"><label>গ্রাহকের নাম</label><input type="text" id="cName" placeholder="নাম লিখুন"></div>
    <div class="fg"><label>ঠিকানা</label><input type="text" id="cAddr" placeholder="ঠিকানা লিখুন"></div>
    <div class="fg"><label>তারিখ</label><input type="date" id="vDate"></div>
    <div class="fg"><label>ভাউচার নং</label><input type="text" id="vNo" placeholder="V-001"></div>
  </div>

  <table class="tbl">
    <thead>
      <tr>
        <th style="width:36px">ক্রঃ</th>
        <th>বিবরণ</th>
        <th style="width:60px">পরিমাণ</th>
        <th style="width:70px">মূল্য (৳)</th>
        <th style="width:70px">টাকা (৳)</th>
        <th style="width:40px">✕</th>
      </tr>
    </thead>
    <tbody id="iBody"></tbody>
  </table>

  <div class="total-show" id="totalShow">মোট: ৳ ০.০০</div>

  <div class="btn-row">
    <button class="btn btn-o" onclick="addRow()">+ সারি যোগ</button>
    <button class="btn btn-g" onclick="genVoucher()">✅ তৈরি করুন</button>
    <button class="btn btn-p" onclick="printV()">🖨️ প্রিন্ট</button>
    <button class="btn btn-r" onclick="resetForm()">🔄 রিসেট</button>
  </div>
</div>

<!-- ====== PREVIEW ====== -->
<div class="preview-box">
  <div class="preview-title no-print">— ভাউচার প্রিভিউ (A4 তে ২ কপি প্রিন্ট হবে) —</div>

  <div class="print-page">

    <!-- Copy 1 -->
    <div>
      <div class="copy-label">★ অফিস কপি ★</div>
      <div class="voucher" id="v1">VOUCHER_TEMPLATE</div>
    </div>

    <div class="cut-line">✂ ✂ ✂ ✂ ✂ ✂ ✂ ✂ ✂ ✂ ✂ ✂ ✂ ✂ ✂ কাটুন ✂ ✂ ✂ ✂ ✂ ✂ ✂ ✂ ✂ ✂ ✂ ✂ ✂ ✂ ✂</div>

    <!-- Copy 2 -->
    <div>
      <div class="copy-label">★ গ্রাহক কপি ★</div>
      <div class="voucher" id="v2">VOUCHER_TEMPLATE</div>
    </div>

  </div>
</div>

function voucherHTML(pvName, pvAddr, pvDate, pvNo, rows, total) {
  let rowsHTML = '';
  if(!rows.length){
    rowsHTML = '<tr><td colspan="5" style="text-align:center;color:#aaa;padding:12px">কোনো আইটেম নেই</td></tr>';
  } else {
    rows.forEach((r,i)=>{
      rowsHTML += `<tr>
        <td>${i+1}</td>
        <td class="dl">${r.desc||'—'}</td>
        <td>${r.qty}</td>
        <td>৳ ${parseFloat(r.price).toFixed(2)}</td>
        <td>৳ ${(r.qty*r.price).toFixed(2)}</td>
      </tr>`;
    });
  }
  return `
    <div class="v-topband"></div>
    <div class="v-header">
      <img class="v-logo" src="${LOGO}" alt="লোগো">
      <div class="v-school">
        <div class="nm">মেরিট কেয়ার কিন্ডার গার্ডেন স্কুল</div>
        <div class="addr">হাবিবপুর, বিরামপুর, দিনাজপুর</div>
        <div class="mob">মোবাইল: ০১৭৩০১১৩০১৩</div>
      </div>
    </div>
    <div class="v-badge">ভাউচার</div>
    <div class="v-info">
      <div class="v-field"><div class="lbl">গ্রাহকের নাম</div><div class="val">${pvName||'—'}</div></div>
      <div class="v-field"><div class="lbl">ঠিকানা</div><div class="val">${pvAddr||'—'}</div></div>
      <div class="v-field"><div class="lbl">তারিখ</div><div class="val">${pvDate||'—'}</div></div>
      <div class="v-field"><div class="lbl">ভাউচার নং</div><div class="val">${pvNo||'—'}</div></div>
    </div>
    <div style="padding:0 14px 0">
      <table class="v-tbl">
        <thead>
          <tr>
            <th style="width:36px">ক্রঃ</th>
            <th>বিবরণ</th>
            <th style="width:55px">পরিমাণ</th>
            <th style="width:85px">মূল্য (৳)</th>
            <th style="width:90px">টাকা (৳)</th>
          </tr>
        </thead>
        <tbody>${rowsHTML}</tbody>
        <tfoot>
          <tr>
            <td colspan="4" style="text-align:right">সর্বমোট:</td>
            <td>৳ ${total.toFixed(2)}</td>
          </tr>
        </tfoot>
      </table>
    </div>
    <div class="v-footer">
      <div class="sig-block"><div class="sig-line"></div><div class="sig-lbl">ক্রেতার স্বাক্ষর</div></div>
      <div class="sig-block"><div class="sig-line"></div><div class="sig-lbl">বিক্রেতার স্বাক্ষর</div></div>
    </div>
    <div class="v-botband"></div>
  `;
}

let rowCount = 0;
function addRow(){
  rowCount++;
  const tr = document.createElement('tr');
  tr.id='r'+rowCount;
  tr.innerHTML=`
    <td style="text-align:center">${rowCount}</td>
    <td><input type="text" placeholder="বিবরণ"></td>
    <td><input type="number" value="1" min="0" oninput="calcRow(${rowCount});calcTotal()"></td>
    <td><input type="number" value="0" min="0" oninput="calcRow(${rowCount});calcTotal()"></td>
    <td class="rt" style="text-align:center;font-weight:600">০</td>
    <td><button class="del-btn" onclick="delRow(${rowCount})">✕</button></td>
  `;
  document.getElementById('iBody').appendChild(tr);
  calcTotal();
}

function calcRow(id){
  const row=document.getElementById('r'+id);
  if(!row)return;
  const inputs=row.querySelectorAll('input[type=number]');
  const q=parseFloat(inputs[0].value)||0;
  const p=parseFloat(inputs[1].value)||0;
  row.querySelector('.rt').textContent=(q*p).toFixed(2);
  calcTotal();
}

function calcTotal(){
  let t=0;
  document.querySelectorAll('.rt').forEach(td=>{t+=parseFloat(td.textContent)||0;});
  document.getElementById('totalShow').textContent='মোট: ৳ '+t.toFixed(2);
}

function delRow(id){
  const r=document.getElementById('r'+id);
  if(r)r.remove();
  calcTotal();
}

function getRows(){
  const rows=[];
  let total=0;
  document.querySelectorAll('#iBody tr').forEach(row=>{
    const inputs=row.querySelectorAll('input');
    const desc=inputs[0]?inputs[0].value:'';
    const qty=parseFloat(inputs[1]?inputs[1].value:0)||0;
    const price=parseFloat(inputs[2]?inputs[2].value:0)||0;
    rows.push({desc,qty,price});
    total+=qty*price;
  });
  return {rows,total};
}

function fmtDate(d){
  if(!d)return '';
  const [y,m,dd]=d.split('-');
  const mn=['জানুয়ারি','ফেব্রুয়ারি','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টেম্বর','অক্টোবর','নভেম্বর','ডিসেম্বর'];
  return parseInt(dd)+' '+mn[parseInt(m)-1]+' '+y;
}

function genVoucher(){
  const name=document.getElementById('cName').value;
  const addr=document.getElementById('cAddr').value;
  const date=fmtDate(document.getElementById('vDate').value);
  const no=document.getElementById('vNo').value;
  const {rows,total}=getRows();
  const html=voucherHTML(name,addr,date,no,rows,total);
  document.getElementById('v1').innerHTML=html;
  document.getElementById('v2').innerHTML=html;
}

function printV(){genVoucher();setTimeout(()=>window.print(),250);}

function resetForm(){
  ['cName','cAddr'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('iBody').innerHTML='';
  rowCount=0;
  calcTotal();
  genVoucher();
}

// Init
const today=new Date();
document.getElementById('vDate').value=today.toISOString().split('T')[0];
document.getElementById('vNo').value='V-'+String(today.getFullYear()).slice(2)+String(today.getMonth()+1).padStart(2,'0')+String(today.getDate()).padStart(2,'0')+'-'+String(Math.floor(Math.random()*900)+100);
for(let i=0;i<4;i++)addRow();
genVoucher();
</script>
